<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>M.V. Electronix LLC | AI Chat</title>
    <!-- Font for Modern Look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="/favicon-64x64.ico">
    <link rel="shortcut icon" href="/favicon-64x64.ico">
    <link rel="apple-touch-icon" sizes="64x64" href="/favicon-64x64.ico">
    
    <style>
      :root {
        /* Liquid Glass Theme Variables */
        --bg-dark: #0f172a;
        --glass-bg: rgba(255,255, 255, 0.05);
        --glass-border: rgba(255, 255, 255, 0.15);
        --text-primary: #f8fafc;
        --text-secondary: #94a3b8;
        --accent-glow: #8b5cf6;
        --accent-secondary: #06b6d4;
        
        /* Message Colors */
        --user-msg-bg: rgba(139, 92, 246, 0.25);
        --user-msg-border: rgba(139, 92, 246, 0.4);
        --bot-msg-bg: rgba(255, 255, 255, 0.08);
        --bot-msg-border: rgba(255, 255, 255, 0.1);
        
        --input-bg: rgba(0, 0, 0, 0.2);
        --font-family: 'Inter', sans-serif;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: var(--font-family);
        background-color: var(--bg-dark);
        color: var(--text-primary);
        height: 100dvh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        position: relative;
        margin: 0;
        padding: 1rem;
      }

      /* --- Animated Liquid Background (Enhanced) --- */
      .background-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        overflow: hidden;
        background: radial-gradient(circle at 50% 50%, #1e1b4b, #000000);
      }

      .blob {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0.6;
        animation: float 20s infinite ease-in-out alternate, rotate 30s infinite linear;
      }

      .blob-1 {
        top: -10%;
        left: -10%;
        width: 50vw;
        height: 50vw;
        background: var(--accent-glow);
        animation-duration: 25s, 50s;
      }

      .blob-2 {
        bottom: -10%;
        right: -10%;
        width: 60vw;
        height: 60vw;
        background: var(--accent-secondary);
        animation-duration: 30s, 60s;
        animation-delay: -5s;
      }

      @keyframes float {
        0% { transform: translate(0, 0) scale(1); }
        100% { transform: translate(30px, 50px) scale(1.1); }
      }

      @keyframes rotate {
        0% { transform: rotate(0deg) scale(1); }
        50% { transform: rotate(180deg) scale(1.1); }
        100% { transform: rotate(360deg) scale(1); }
      }

      /* --- Main Container (Entrance Animation) --- */
      .chat-container {
        display: flex;
        flex-direction: column;
        width: 100%;
        max-width: 800px;
        height: 100%;
        max-height: 90vh;
        background: var(--glass-bg);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid var(--glass-border);
        border-radius: 24px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        overflow: hidden;
        position: relative;
        z-index: 10;
        animation: containerEntrance 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        opacity: 0;
        transform: scale(0.95) translateY(20px);
      }

      @keyframes containerEntrance {
        to { opacity: 1; transform: scale(1) translateY(0); }
      }

      /* --- Header (Shimmer Effect) --- */
      header {
        text-align: center;
        padding: 1.5rem;
        border-bottom: 1px solid var(--glass-border);
        background: rgba(255, 255, 255, 0.02);
        flex-shrink: 0;
        position: relative;
        overflow: hidden;
      }

      /* Shimmer sheen animation */
      header::after {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 50%;
        height: 100%;
        background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent);
        transform: skewX(-20deg);
        animation: shimmer 6s infinite;
      }

      @keyframes shimmer {
        0% { left: -100%; }
        20% { left: 200%; }
        100% { left: 200%; }
      }

      .header-brand {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        margin-bottom: 0.25rem;
        position: relative;
        z-index: 2;
      }

      h1 {
        font-size: 1.5rem;
        color: var(--text-primary);
        font-weight: 600;
        letter-spacing: -0.025em;
        margin: 0;
        text-shadow: 0 0 20px rgba(255,255,255,0.1);
      }

      .brand-logo {
        width: 40px;
        height: 40px;
        border-radius: 12px;
        object-fit: contain;
        background: rgba(255, 255, 255, 0.1);
        padding: 4px;
        box-shadow: 0 0 15px var(--accent-secondary);
        animation: logoGlow 3s infinite alternate;
      }

      @keyframes logoGlow {
        from { box-shadow: 0 0 10px var(--accent-secondary); }
        to { box-shadow: 0 0 25px var(--accent-glow); }
      }

      header p {
        color: var(--text-secondary);
        font-size: 0.85rem;
        position: relative;
        z-index: 2;
      }

      /* --- Chat Messages Area --- FIXED --- */
      .chat-messages {
        flex: 1 1 auto;
        min-height: 0; /* CRITICAL FIX for Firefox */
        overflow-y: auto;
        overflow-x: hidden;
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
        scroll-behavior: smooth;
        -webkit-overflow-scrolling: touch; /* Smooth scrolling on iOS */
      }

      /* --- Messages --- FIXED --- */
      .message {
        padding: 1rem 1.25rem;
        border-radius: 16px;
        max-width: 85%;
        position: relative;
        line-height: 1.6;
        font-size: 0.95rem;
        word-wrap: break-word;
        overflow-wrap: break-word; /* Better word breaking */
        word-break: break-word; /* Prevent overflow */
        white-space: pre-wrap;
        animation: slideIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        overflow: visible !important; /* FIX: Ensure content is visible */
      }

      @keyframes slideIn {
        from { opacity: 0; transform: translateY(20px) scale(0.95); }
        to { opacity: 1; transform: translateY(0) scale(1); }
      }

      /* Message Shimmer - Fixed to not cause overflow */
      .message::before {
        content: "";
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.03) 50%, transparent 70%);
        transform: translateX(-100%);
        animation: msgShimmer 3s infinite;
        pointer-events: none; /* Don't interfere with clicks */
        z-index: 0;
      }
      
      @keyframes msgShimmer {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
      }

      .message p {
        margin: 0;
        position: relative;
        z-index: 1; /* Ensure text is above shimmer */
      }

      .user-message {
        background-color: var(--user-msg-bg);
        border: 1px solid var(--user-msg-border);
        color: #fff;
        align-self: flex-end;
        border-bottom-right-radius: 4px;
        box-shadow: 0 4px 15px rgba(139, 92, 246, 0.15), 0 0 0 1px rgba(139, 92, 246, 0.1);
      }

      .assistant-message {
        background-color: var(--bot-msg-bg);
        border: 1px solid var(--bot-msg-border);
        color: #e2e8f0;
        align-self: flex-start;
        border-bottom-left-radius: 4px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      }

      /* Typewriter Cursor for initial message */
      .typing-cursor {
        display: inline-block;
        width: 2px;
        height: 1em;
        background-color: currentColor;
        margin-left: 2px;
        animation: blink 1s step-end infinite;
        vertical-align: text-bottom;
      }
      @keyframes blink { 50% { opacity: 0; } }

      /* --- Typing Indicator --- */
      .typing-indicator {
        display: none;
        padding: 12px 16px;
        background: var(--bot-msg-bg);
        border: 1px solid var(--bot-msg-border);
        border-radius: 16px;
        border-bottom-left-radius: 4px;
        width: fit-content;
        align-self: flex-start;
        color: var(--text-secondary);
        font-style: italic;
        font-size: 0.85rem;
        margin-bottom: 1rem;
        animation: slideIn 0.3s ease-out;
      }
      
      .typing-indicator.visible {
        display: block;
      }

      /* --- Input Area --- */
      .message-input {
        display: flex;
        padding: 1rem 1.5rem;
        border-top: 1px solid var(--glass-border);
        background: rgba(0, 0, 0, 0.2);
        gap: 0.75rem;
        flex-shrink: 0;
        position: relative;
      }

      #user-input {
        flex: 1;
        padding: 0.75rem 1rem;
        background: var(--input-bg);
        border: 1px solid var(--glass-border);
        border-radius: 12px;
        color: #fff;
        font-family: inherit;
        resize: none;
        min-height: 48px;
        max-height: 150px;
        outline: none;
        font-size: 16px;
        transition: border-color 0.2s, box-shadow 0.2s, background 0.3s;
        overflow-y: auto;
        line-height: 1.5;
      }

      #user-input::placeholder {
        color: rgba(255,255,255, 0.3);
      }

      #user-input:focus {
        border-color: rgba(139, 92, 246, 0.5);
        box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.1), 0 0 20px rgba(139, 92, 246, 0.2);
        background: rgba(0,0,0,0.3);
      }

      #send-button {
        padding: 0 1.5rem;
        background: linear-gradient(135deg, var(--accent-glow), #7c3aed);
        color: white;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.2s;
        font-weight: 500;
        font-family: inherit;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        position: relative;
        overflow: hidden;
      }

      #send-button:hover {
        box-shadow: 0 0 15px var(--accent-glow);
        transform: translateY(-2px);
      }

      #send-button:active {
        transform: translateY(1px);
        box-shadow: 0 0 5px var(--accent-glow);
      }

      /* Shockwave animation for button click */
      .shockwave {
        position: absolute;
        top: 50%; left: 50%;
        width: 0; height: 0;
        background: rgba(255,255,255,0.5);
        border-radius: 50%;
        transform: translate(-50%, -50%);
        animation: ripple 0.6s linear;
      }
      @keyframes ripple {
        0% { width: 0; height: 0; opacity: 0.8; }
        100% { width: 200px; height: 200px; opacity: 0; }
      }

      #send-button:disabled {
        background: var(--glass-border);
        cursor: not-allowed;
        opacity: 0.5;
        transform: none;
      }

      /* --- Footer --- */
      footer {
        text-align: center;
        font-size: 0.75rem;
        color: var(--text-secondary);
        padding: 0.75rem;
        border-top: 1px solid var(--glass-border);
        background: rgba(0,0,0,0.2);
        flex-shrink: 0;
      }

      /* Custom scrollbar for chat area - FIXED VISIBILITY */
      .chat-messages::-webkit-scrollbar {
        width: 8px; /* Increased for better visibility */
      }

      .chat-messages::-webkit-scrollbar-track {
        background: transparent;
      }

      .chat-messages::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.15);
        border-radius: 4px;
        border: 2px solid transparent;
        background-clip: padding-box;
      }

      .chat-messages::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.25);
        border: 2px solid transparent;
        background-clip: padding-box;
      }

      /* Firefox scrollbar */
      .chat-messages {
        scrollbar-width: thin;
        scrollbar-color: rgba(255, 255, 255, 0.15) transparent;
      }

      /* --- Mobile Specific Optimizations --- */
      @media (max-width: 600px) {
        body {
          padding: 0;
          height: 100dvh;
        }

        .chat-container {
          height: 100dvh;
          max-height: 100dvh;
          width: 100%;
          border-radius: 0;
          border: none;
          box-shadow: none;
        }

        header {
          padding: 1rem;
        }
        
        .brand-logo {
            width: 32px;
            height: 32px;
        }

        h1 {
          font-size: 1.1rem;
        }

        .chat-messages {
          padding: 1rem;
          gap: 1rem;
          padding-bottom: 1rem; /* Removed extra padding that was hiding content */
        }

        .message {
          max-width: 90%;
          padding: 0.875rem 1rem;
          font-size: 0.9rem;
        }

        .message::before {
          animation-duration: 4s; /* Slower shimmer on mobile for performance */
        }

        .message-input {
          padding: 1rem;
          padding-bottom: calc(1rem + env(safe-area-inset-bottom, 0));
          gap: 0.5rem;
        }

        #user-input {
          font-size: 16px; /* Prevents iOS zoom */
          min-height: 44px; /* Better touch target */
        }

        #send-button {
          padding: 0 1rem;
          min-height: 44px;
        }

        footer {
          display: none;
        }

        /* Smaller scrollbar on mobile */
        .chat-messages::-webkit-scrollbar {
          width: 4px;
        }
      }

      @media (max-height: 600px) {
        header {
          padding: 0.75rem 1rem;
        }
        
        .chat-messages {
          padding: 1rem;
          gap: 0.75rem;
        }
        
        .message {
          padding: 0.75rem 1rem;
        }
      }

      /* Ensure text doesn't overflow in long messages */
      .message p {
        overflow-wrap: anywhere; /* Most aggressive word breaking */
        hyphens: auto; /* Add hyphenation where appropriate */
      }

      /* Fix for very long unbroken strings (like URLs) */
      .message {
        overflow-wrap: anywhere;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    
    <!-- Background Animation -->
    <div class="background-container">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
    </div>

    <div class="chat-container">
      <header>
        <div class="header-brand">
          <img 
            src="https://mvelectronix.com/assets/images/logofinal-80x80.png" 
            alt="M.V. Electronix Logo" 
            class="brand-logo"
            onerror="this.style.display='none'"
          >
          <h1>M.V. Electronix LLC</h1>
        </div>
        <p>Electronix Repair Assistant</p>
      </header>

      <div id="chat-messages" class="chat-messages">
        <div class="message assistant-message">
          <p id="intro-text"></p>
        </div>
      </div>

      <div class="typing-indicator" id="typing-indicator">
        AI is thinking...
      </div>

      <div class="message-input">
        <textarea
          id="user-input"
          placeholder="Type your message here..."
          rows="1"
          autofocus
        ></textarea>
        <button id="send-button">Send</button>
      </div>

      <footer>
        <p>M.V. Electronix LLC &copy; 2026</p>
      </footer>
    </div>

    <!-- Animation Script for Intro & Effects -->
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        // 1. Typewriter Effect for Intro
        const introText = "Hello! I am the M.V. Electronix AI repair assistant. How can I help you today?";
        const introElement = document.getElementById('intro-text');
        let index = 0;

        function typeWriter() {
          if (index < introText.length) {
            introElement.innerHTML = introText.substring(0, index + 1) + '<span class="typing-cursor">|</span>';
            index++;
            setTimeout(typeWriter, 30);
          } else {
            introElement.innerHTML = introText;
          }
        }
        
        // Start typing after container entrance
        setTimeout(typeWriter, 600);

        // 2. Shockwave Effect on Send Button
        const sendBtn = document.getElementById('send-button');
        sendBtn.addEventListener('click', function(e) {
          const wave = document.createElement('div');
          wave.classList.add('shockwave');
          this.appendChild(wave);
          
          setTimeout(() => {
            wave.remove();
          }, 600);
        });
      });
    </script>
    
    <!-- Chat app script -->
    <script src="chat.js"></script>
  </body>
</html>
